services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ../debt-advisor
      dockerfile: Dockerfile.dev
    volumes:
      - ../debt-advisor:/app
      - /app/node_modules  # keep container node_modules isolated from host
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true  # required for file watching in WSL2/Docker
    depends_on:
      - api
    restart: unless-stopped
