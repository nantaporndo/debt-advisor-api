services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ../debt-advisor
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
